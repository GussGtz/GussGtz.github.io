<head>
    <meta charset="utf-8" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9fa;
        }
        .text-gradient {
            background: linear-gradient(to right, #FA6363, #F1EFE5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hover-zoom:hover {
            transform: scale(1.02);
            transition: transform 0.3s ease;
        }
        a {
            word-break: break-word;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
<main class="flex-shrink-0">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 shadow-sm" data-aos="fade-down">
        <div class="container px-3">
            <a class="navbar-brand fw-bold text-primary" href="index.html">Gustavo Gutierrez</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>

                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="py-5">
          <style>
            body {
              background-color: #f2f2f2;
              display: flex;
              justify-content: center;
              align-items: center;
              height: 100vh;
              font-family: 'Segoe UI', sans-serif;
              margin: 0;
            }
        
            form {
              background-color: #fff;
              padding: 25px 30px;
              border-radius: 12px;
              box-shadow: 0 0 10px rgba(0,0,0,0.1);
              width: 100%;
              max-width: 400px;
              display: flex;
              flex-direction: column;
              gap: 15px;
            }
        
            h2 {
              margin-bottom: 10px;
              font-size: 1.5rem;
              text-align: center;
            }
        
            label {
              font-weight: bold;
              font-size: 0.9rem;
            }
        
            input, textarea {
              padding: 10px;
              border: 1px solid #ccc;
              border-radius: 8px;
              font-size: 0.95rem;
              resize: vertical;
            }
        
            button {
              background-color: #111;
              color: #fff;
              padding: 10px;
              border: none;
              border-radius: 8px;
              font-size: 1rem;
              cursor: pointer;
              transition: background 0.3s ease;
            }
        
            button:hover {
              background-color: #333;
            }
          </style>
        </head>
        <body>
        
          <form action="https://formspree.io/f/your-form-id" method="POST">
            <h2>Contáctame</h2>
        
            <label for="name">Nombre</label>
            <input type="text" id="name" name="name" required>
        
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required>
        
            <label for="message">Mensaje</label>
            <textarea id="message" name="message" rows="5" required></textarea>
        
            <button type="submit">Enviar</button>
          </form>
        
    
        
    </section>
</main>

<!-- Footer -->
<footer class="bg-white text-center py-4 mt-auto shadow-sm">
    <div class="container small">© Gustavo Gutierrez 2024</div>
</footer>
